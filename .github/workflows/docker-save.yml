name: Docker Image Downloader

on:
  workflow_dispatch: 

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
    - name: Pull and Save Docker Image
      run: |
        # 1. 从 quay.io 成功拉取
        docker pull quay.io/gerritforge/gerrit:3.9.5-almalinux9
        
        # 2. 洗白名字，伪装成你 docker-compose.yml 里面写的名字
        docker tag quay.io/gerritforge/gerrit:3.9.5-almalinux9 gerritforge/gerrit:3.9.5-almalinux9
        
        # 3. 打包
        docker save -o gerrit_image.tar gerritforge/gerrit:3.9.5-almalinux9
        
    - name: Upload Image Artifact
      uses: actions/upload-artifact@v4
      with:
        name: gerrit-tar-package
        path: gerrit_image.tar
